replicaCount: 1

image:
  repository: ghcr.io/ad-1/sentic-aggregator
  pullPolicy: IfNotPresent
  # CI updates image.tag here via a PR on every successful image push.
  tag: "latest"

rabbitmq:
  secretName: definition-default-user
  consumeQueue: rich-content
  publishQueue: enriched-batches

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
